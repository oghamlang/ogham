syntax = "proto3";

package ogham.compiler;

import "ogham/ir/types.proto";

// Sent to a plugin via stdin. Contains the fully resolved IR.
message OghamCompileRequest {
    // Compiler version that produced this request.
    string compiler_version = 1;

    // The module being compiled.
    ir.Module module = 2;

    // Plugin options from ogham.gen.yaml `opts` section.
    map<string, string> options = 3;

    // Output directory specified in ogham.gen.yaml.
    string output_dir = 4;
}

// Returned by a plugin via stdout.
message OghamCompileResponse {
    repeated GeneratedFile files = 1;
    repeated CompileError errors = 2;
}

// A file produced by a plugin.
message GeneratedFile {
    // Path relative to output_dir.
    string name = 1;

    // File contents.
    bytes content = 2;

    // If true, content is appended to existing file instead of overwriting.
    bool append = 3;
}

// An error reported by a plugin.
message CompileError {
    string message = 1;
    Severity severity = 2;

    // Optional: source location that caused the error.
    string source_type = 3;
    string source_field = 4;
}

enum Severity {
    SEVERITY_NONE = 0;
    ERROR = 1;
    WARNING = 2;
    INFO = 3;
}

// gRPC service for remote plugins (ogham serve --plugin <name> --address :50051).
service OghamPluginAPI {
    // Unary: compile a module and return generated files.
    rpc Compile(OghamCompileRequest) returns (OghamCompileResponse) {}
}
